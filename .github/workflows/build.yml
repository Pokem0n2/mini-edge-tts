name: Build Windows EXE

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

jobs:
  build:
    strategy:
      fail-fast: false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Install mingw-w64
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64

      - name: Rust target
        run: rustup target add x86_64-pc-windows-gnu

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri (Windows cross-compile)
        run: |
          cd src-tauri
          cargo build --target x86_64-pc-windows-gnu --release
        env:
          CARGO_INCREMENTAL: 0

      - name: Build frontend
        run: npm run build

      - name: Create results directory
        run: mkdir -p dist && mkdir -p src-tauri/target/x86_64-pc-windows-gnu/release/results

      - name: Prepare distribution
        run: |
          cp -r dist src-tauri/target/x86_64-pc-windows-gnu/release/
          mkdir -p src-tauri/target/x86_64-pc-windows-gnu/release/results

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mini-edge-tts-windows
          path: |
            src-tauri/target/x86_64-pc-windows-gnu/release/MiniEdgeTTS.exe
            src-tauri/target/x86_64-pc-windows-gnu/release/dist/
          if-no-files-found: error

      - name: Create results folder placeholder
        run: |
          mkdir -p results
          echo "Place your generated MP3 files here" > results/README.txt

      - name: Attach results to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: src-tauri/target/x86_64-pc-windows-gnu/release/MiniEdgeTTS.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
